schema: spec-driven

context: |
  This project (vectis) builds cross-platform applications using the Crux framework (Rust).
  The core-writer skill at .cursor/skills/core-writer/SKILL.md generates Crux shared crates
  from app spec files. Each example app lives in examples/<app-name>/ as a Cargo workspace
  with a shared/ crate containing all business logic, state management, and side-effect
  orchestration. See examples/todo/ for a reference implementation.

  The crux-app schema orchestrates core generation: it produces a core-writer-compatible
  app-spec artifact, then the apply phase invokes the core-writer skill to generate the code.

  The ios-shell schema orchestrates iOS shell generation: it produces a shell-spec artifact
  with iOS-specific UI details, then the apply phase invokes the ios-writer skill to generate
  SwiftUI views, Core.swift bridge, and XcodeGen project configuration. The ios-reviewer skill
  reviews the generated shell for structural and quality issues. All iOS shells use the shared
  VectisDesign package at design-system/ios/ for consistent styling.

rules:
  app-spec:
    - Follow the core-writer app-spec-template.md format exactly
    - Include all sections -- Overview, Features, Data Model, User Interface, Views, Capabilities, API Details, Business Rules
    - The Capabilities table must include all five capability rows (HTTP, KV, Timer/Time, SSE, Platform detection)
    - The title line must be "# App Specification: <AppName>"
  tasks:
    - Tasks must invoke the core-writer skill via .cursor/skills/core-writer/SKILL.md
    - Include verification steps (cargo check, cargo test, cargo clippy)
