name: Todo
packages:
  SharedTypes:
    path: ./generated/SharedTypes
  Shared:
    path: ./generated/Shared
  Inject:
    url: https://github.com/krzysztofzablocki/Inject.git
    from: "1.5.2"
options:
  bundleIdPrefix: com.vectis.todo
  deploymentTarget:
    iOS: "17.0"
attributes:
  BuildIndependentTargetsInParallel: true
targets:
  Todo:
    type: application
    platform: iOS
    sources:
      - Todo
    dependencies:
      - package: SharedTypes
      - package: Shared
      - package: Inject
    info:
      path: Todo/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.vectis.todo.debug
          OTHER_LDFLAGS: ["-w", "-Xlinker", "-interposable"]
          EMIT_FRONTEND_COMMAND_LINES: "YES"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.vectis.todo
          OTHER_LDFLAGS: ["-w"]
