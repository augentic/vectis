name: CI

on:
  push:
    paths:
      - "plugins/**"
      - "skills/**"
      - "references/**"
      - ".github/workflows/ci.yaml"
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate plugin
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        plugin: [realtime, sdlc]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Claude plugin validate
        run: claude plugin validate ./plugins/${{ matrix.plugin }}

  check-links:
    name: Check symlinks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        plugin: [realtime, sdlc]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Symlinks resolve
        run: |
          echo "Checking symlinks for ${{ matrix.plugin }} plugin..."
          failed=0
          for link in $(find plugins/${{ matrix.plugin }}/skills -type l); do
            target=$(readlink -f "$link" 2>/dev/null)
            if [ ! -e "$target" ]; then
              echo "BROKEN: $link -> $(readlink "$link")"
              failed=1
            else
              echo "OK: $link -> $(readlink "$link")"
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::Broken symlinks detected"
            exit 1
          fi

  lint-docs:
    name: Check documentation consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for broken internal references
        run: |
          echo "Scanning for references to non-existent files..."
          failed=0

          # Check markdown links to local files
          for md_file in $(find . -name "*.md" -not -path "./.git/*" -not -path "./node_modules/*"); do
            # Extract relative links (not URLs)
            links=$(grep -oP '\[.*?\]\((?!https?://|#)(.*?)\)' "$md_file" | grep -oP '\(([^)#]+)' | tr -d '(' || true)
            dir=$(dirname "$md_file")
            for link in $links; do
              resolved="$dir/$link"
              if [ ! -e "$resolved" ] && [ ! -L "$resolved" ]; then
                echo "BROKEN: $md_file references $link (resolved: $resolved)"
                failed=1
              fi
            done
          done

          if [ "$failed" -eq 1 ]; then
            echo "::warning::Some internal links may be broken (review above)"
          fi
